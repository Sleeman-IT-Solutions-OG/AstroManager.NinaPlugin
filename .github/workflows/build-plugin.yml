name: Build Plugin

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Configure GitHub Packages source
        run: dotnet nuget add source --username "${{ github.actor }}" --password "${{ secrets.GITHUB_TOKEN }}" --store-password-in-clear-text --name github "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"

      - name: Restore
        run: dotnet restore .\AstroManager.NinaPlugin\AstroManager.NinaPlugin.csproj

      - name: Build
        run: dotnet build .\AstroManager.NinaPlugin\AstroManager.NinaPlugin.csproj -c Release --no-restore
